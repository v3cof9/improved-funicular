name: Spotify Downloader

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Spotify URL to download'
        required: true
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install spotDL
        run: |
          pip install spotdl

      - name: Download Spotify track
        run: |
          mkdir -p downloads
          spotdl "${{ inputs.url }}" \
            --format mp3 \
            --bitrate 320k \
            --output "downloads/{title} - {artist}.{output-ext}"

      - name: List downloaded files
        run: |
          echo "Downloaded files:"
          ls -la downloads/

      - name: Commit files to repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/
          git commit -m "Add downloaded Spotify track" || echo "No changes to commit"
          git push
