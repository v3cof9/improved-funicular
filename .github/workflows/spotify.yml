name: Spotify Downloader

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Spotify URL'
        required: true
        type: string

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install FFmpeg and spotDL
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install spotdl

      - name: Create cookies file
        run: |
          echo "${{ secrets.YOUTUBE_COOKIES }}" > /tmp/cookies.txt
          echo "Cookie file size: $(wc -c < /tmp/cookies.txt)"
          head -5 /tmp/cookies.txt

      - name: Test yt-dlp with cookies
        run: |
          yt-dlp --cookies /tmp/cookies.txt \
            -f bestaudio \
            "https://music.youtube.com/watch?v=hThAlY3Q2Kw" \
            -o "test.%(ext)s" \
            --verbose || echo "yt-dlp failed"

      - name: Download with spotDL
        run: |
          mkdir -p downloads
          python -m spotdl "${{ inputs.url }}" \
            --output "downloads/" \
            --cookie-file /tmp/cookies.txt \
            --log-level DEBUG

      - name: Commit files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/ test.* 2>/dev/null || true
          git commit -m "Test: ${{ inputs.url }}" || echo "No changes"
          git push
