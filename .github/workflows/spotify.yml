name: Spotify Downloader

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Spotify/Tidal/Apple Music URL'
        required: true
        type: string
      quality:
        description: 'Audio quality'
        required: false
        type: choice
        options:
          - 'LOSSLESS'
          - 'HI_RES_LOSSLESS'
          - 'DOLBY_ATMOS'
          - 'HIGH'
          - 'LOW'
        default: 'LOSSLESS'
      service:
        description: 'Download service'
        required: false
        type: choice
        options:
          - 'tidal'
          - 'qobuz'
          - 'deezer'
          - 'amazon'
        default: 'tidal'

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install SpotiFLAC
        run: |
          pip install SpotiFLAC

      - name: Download track
        run: |
          mkdir -p downloads
          spotiflac "${{ inputs.url }}" \
            downloads/ \
            --service "${{ inputs.service }}" \
            --quality "${{ inputs.quality }}" \
            --filename-format "{track}. {title} - {artist}"

      - name: Commit files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/
          git commit -m "Add downloaded: ${{ inputs.url }}" || echo "No changes to commit"
          git pushname: Spotify Downloader

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Spotify URL to download'
        required: true
        type: string

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install FFmpeg and spotDL
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          pip install spotdl

      - name: Download Spotify track
        run: |
          mkdir -p downloads
          python -m spotdl "${{ inputs.url }}" \
            --output "downloads/{title} - {artist}.{output-ext}"

      - name: Debug - Check what was downloaded
        run: |
          echo "=== Downloads folder ==="
          ls -la downloads/ || echo "No downloads folder"
          echo "=== Git status ==="
          git status

      - name: Commit files to repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/
          git status
          git commit -m "Add downloaded Spotify track" || echo "No changes to commit"
          git push origin HEAD:main || git push origin HEAD:master
