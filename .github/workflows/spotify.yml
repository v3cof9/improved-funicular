name: Spotify Downloader

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Spotify URL'
        required: true
        type: string

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup WireGuard VPN
        run: |
          sudo apt-get update
          sudo apt-get install -y wireguard-tools
          echo "${{ secrets.WG_CONFIG }}" | sudo tee /etc/wireguard/wg0.conf
          sudo wg-quick up wg0
          sleep 2
          curl -s ifconfig.me
          echo " - VPN connected"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install SpotiFLAC
        run: |
          pip install SpotiFLAC

      - name: Download with SpotiFLAC
        run: |
          mkdir -p downloads
          spotiflac "${{ inputs.url }}" \
            downloads/ \
            --service deezer qobuz tidal \
            --quality LOSSLESS \
            --filename-format "{title} - {artist}" \
            --timeout 120 \
            --retries 3 \
            --verbose

      - name: Commit files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/
          git commit -m "Add: ${{ inputs.url }}" || echo "No changes"
          git push

      - name: Disconnect VPN
        if: always()
        run: |
          sudo wg-quick down wg0
