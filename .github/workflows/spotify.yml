name: Spotify Downloader

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Spotify URL'
        required: true
        type: string

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install SpotiFLAC
        run: |
          pip install SpotiFLAC
          python -c "import SpotiFLAC; print(dir(SpotiFLAC))"

      - name: Try Deezer (most reliable)
        run: |
          mkdir -p downloads/deezer
          spotiflac "${{ inputs.url }}" \
            downloads/deezer/ \
            --service deezer \
            --quality LOSSLESS \
            --filename-format "{title} - {artist}" \
            --timeout 60 \
            --retries 2 || echo "Deezer LOSSLESS failed"
          
          spotiflac "${{ inputs.url }}" \
            downloads/deezer/ \
            --service deezer \
            --quality HIGH \
            --filename-format "{title} - {artist}" \
            --timeout 60 \
            --retries 2 || echo "Deezer HIGH failed"

      - name: Try Qobuz
        run: |
          mkdir -p downloads/qobuz
          spotiflac "${{ inputs.url }}" \
            downloads/qobuz/ \
            --service qobuz \
            --quality 6 \
            --filename-format "{title} - {artist}" \
            --timeout 60 \
            --retries 2 || echo "Qobuz 6 failed"

      - name: Try Tidal
        run: |
          mkdir -p downloads/tidal
          spotiflac "${{ inputs.url }}" \
            downloads/tidal/ \
            --service tidal \
            --quality LOSSLESS \
            --filename-format "{title} - {artist}" \
            --timeout 60 \
            --retries 2 || echo "Tidal LOSSLESS failed"

      - name: Try SoundCloud
        run: |
          mkdir -p downloads/soundcloud
          spotiflac "${{ inputs.url }}" \
            downloads/soundcloud/ \
            --service soundcloud \
            --quality HIGH \
            --filename-format "{title} - {artist}" \
            --timeout 60 \
            --retries 2 || echo "SoundCloud failed"

      - name: Show results
        run: |
          echo "=== All downloads ==="
          find downloads -type f \( -name "*.flac" -o -name "*.mp3" -o -name "*.m4a" \) -exec ls -lh {} \; 2>/dev/null
          echo ""
          echo "=== Sizes ==="
          du -sh downloads/*/ 2>/dev/null

      - name: Commit files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/
          git commit -m "Probe: ${{ inputs.url }}" || echo "No changes"
          git push
