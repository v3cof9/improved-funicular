name: Spotify Downloader

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Spotify URL'
        required: true
        type: string

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install FFmpeg and spotDL
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install spotdl
          pip install --upgrade yt-dlp

      - name: Test yt-dlp first
        run: |
          yt-dlp --version
          yt-dlp -f bestaudio "https://music.youtube.com/watch?v=hThAlY3Q2Kw" \
            --print filename \
            --dry-run || echo "yt-dlp failed directly too"

      - name: Download with detailed logging
        run: |
          mkdir -p downloads
          python -m spotdl "${{ inputs.url }}" \
            --output "downloads/" \
            --log-level DEBUG \
            --dont-filter-results \
            --max-retries 5 || echo "spotdl failed"

      - name: Debug
        run: |
          echo "=== Contents ==="
          ls -la downloads/ || echo "empty"
          ls -la raw/ || echo "no raw"

      - name: Commit files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/ || true
          git add raw/ || true
          git commit -m "Debug: ${{ inputs.url }}" || echo "No changes to commit"
          git push
