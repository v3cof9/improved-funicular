name: Spotify Downloader

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Spotify URL'
        required: true
        type: string

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install FFmpeg and spotDL
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install spotdl

      - name: Download track
        run: |
          mkdir -p downloads
          python -m spotdl "${{ inputs.url }}" \
            --output "downloads/{title} - {artist}.{output-ext}"

      - name: Commit files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/
          git commit -m "Add: ${{ inputs.url }}" || echo "No changes to commit"
          git push
