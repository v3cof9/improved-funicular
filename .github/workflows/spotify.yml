name: Spotify Downloader

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Spotify URL'
        required: true
        type: string

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install SpotiFLAC
        run: |
          pip install SpotiFLAC

      - name: Health check all services
        run: |
          python << 'EOF'
          from backend.core.health_check import run_health_check, print_health_report
          results = run_health_check(["tidal", "qobuz", "deezer", "amazon", "soundcloud", "youtube"])
          print_health_report(results)
          EOF

      - name: Try all services with all qualities
        run: |
          mkdir -p downloads
          
          SERVICES=("deezer" "qobuz" "tidal" "amazon" "soundcloud" "youtube")
          QUALITIES=("LOSSLESS" "HIGH" "LOW" "6" "7" "27")
          URL="${{ inputs.url }}"
          
          for svc in "${SERVICES[@]}"; do
            for q in "${QUALITIES[@]}"; do
              echo "=== Trying: $svc - $q ==="
              spotiflac "$URL" "downloads/$svc-$q/" \
                --service "$svc" \
                --quality "$q" \
                --filename-format "{title} - {artist}" \
                --timeout 30 \
                --retries 1 2>&1 | tail -5
              echo ""
            done
          done

      - name: Show results
        run: |
          echo "=== Downloaded files ==="
          find downloads -type f -exec ls -lh {} \; 2>/dev/null || echo "Nothing downloaded"
          echo ""
          echo "=== Directory sizes ==="
          du -sh downloads/*/ 2>/dev/null || echo "No directories"

      - name: Commit files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/
          git commit -m "Probe: ${{ inputs.url }}" || echo "No changes"
          git push
