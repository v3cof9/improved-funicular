name: Spotify Downloader

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Spotify URL'
        required: true
        type: string

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          pip install spotdl yt-dlp

      - name: Create cookies
        run: echo "${{ secrets.YOUTUBE_COOKIES }}" > /tmp/cookies.txt

      - name: Get song info from Spotify URL
        id: info
        run: |
          # Extract Spotify track ID from URL
          TRACK_ID=$(echo "${{ inputs.url }}" | grep -oP 'track/\K[^?]+')
          
          # Use Spotify's public API
          ACCESS_TOKEN=$(curl -s -X POST "https://accounts.spotify.com/api/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=client_credentials" \
            -d "client_id=${{ secrets.SPOTIFY_CLIENT_ID }}" \
            -d "client_secret=${{ secrets.SPOTIFY_CLIENT_SECRET }}" | jq -r '.access_token')
          
          TRACK_INFO=$(curl -s "https://api.spotify.com/v1/tracks/$TRACK_ID" \
            -H "Authorization: Bearer $ACCESS_TOKEN")
          
          ARTIST=$(echo "$TRACK_INFO" | jq -r '.artists[0].name')
          TITLE=$(echo "$TRACK_INFO" | jq -r '.name')
          
          echo "query=${ARTIST} - ${TITLE}" >> $GITHUB_OUTPUT
          echo "Found: ${ARTIST} - ${TITLE}"

      - name: Download
        run: |
          mkdir -p downloads
          yt-dlp \
            --cookies /tmp/cookies.txt \
            "ytsearch1:${{ steps.info.outputs.query }}" \
            -f bestaudio \
            -x \
            --audio-format mp3 \
            --audio-quality 0 \
            -o "downloads/%(title)s.%(ext)s"

      - name: Commit files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/
          git commit -m "Download: ${{ inputs.url }}" || echo "No changes"
          git push
