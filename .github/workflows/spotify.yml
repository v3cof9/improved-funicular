name: Spotify Downloader

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Spotify URL'
        required: true
        type: string

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          pip install spotdl yt-dlp

      - name: Create cookies
        run: echo "${{ secrets.YOUTUBE_COOKIES }}" > /tmp/cookies.txt

      - name: Get song info
        id: info
        run: |
          python << EOF
          import spotdl
          s = spotdl.Song.from_url("${{ inputs.url }}")
          print(f"{s.artist} - {s.title}")
          EOF

      - name: Download
        run: |
          mkdir -p downloads
          
          SONG=$(python -c "import spotdl; s=spotdl.Song.from_url('${{ inputs.url }}'); print(f'{s.artist} - {s.title}')")
          
          yt-dlp \
            --cookies /tmp/cookies.txt \
            "ytsearch1:${SONG}" \
            -f bestaudio \
            -x \
            --audio-format mp3 \
            --audio-quality 0 \
            -o "downloads/%(title)s.%(ext)s" \
            --embed-metadata

      - name: Commit files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/
          git commit -m "Download: ${{ inputs.url }}" || echo "No changes"
          git push
