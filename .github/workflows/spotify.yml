name: Spotify Downloader

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Spotify URL'
        required: true
        type: string

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install tools
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install yt-dlp

      - name: Create cookies
        run: echo "${{ secrets.YOUTUBE_COOKIES }}" > /tmp/cookies.txt

      - name: Download as MP3
        run: |
          mkdir -p downloads
          yt-dlp --cookies /tmp/cookies.txt \
            "ytsearch:${{ inputs.url }}" \
            -f "bestaudio" \
            -o "downloads/%(title)s.%(ext)s" \
            --extract-audio \
            --audio-format mp3 \
            --audio-quality 320k \
            --embed-thumbnail \
            --add-metadata

      - name: Commit files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/
          git commit -m "Add: ${{ inputs.url }}" || echo "No changes"
          git push
